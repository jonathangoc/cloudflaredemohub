name = "cloudflare-demo-hub-agent"
main = "src/server.ts"
compatibility_date = "2026-03-19"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "ChatAgent"
class_name = "ChatAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatAgent"]

[env.production]
name = "cloudflare-demo-hub-agent"

[[env.production.routes]]
pattern = "demoaiagent.jonathangoc.com"
custom_domain = true
